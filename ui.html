<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DocEx</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    main { padding-top: 1rem; }
    #result { margin-top: 1rem; }
    #result pre { overflow-x: auto; }
    .error { color: var(--pico-del-color); }
    .success { color: var(--pico-ins-color); }
    details[open] { padding-bottom: 1rem; }
    nav ul li a[aria-current] { font-weight: 700; }
    #doc-content { white-space: pre-wrap; line-height: 1.6; }
    #doc-view[hidden] { display: none; }
    .meta-table td:first-child { font-weight: 700; width: 30%; }
  </style>
</head>
<body>
<main class="container">
  <hgroup>
    <h1>DocEx</h1>
    <p>Distributed document search — async ingest, full-text search, multi-tenant</p>
  </hgroup>

  <nav id="tabs">
    <ul>
      <li><a href="#ingest" aria-current="page" onclick="return navigateTo('ingest')">Ingest</a></li>
      <li><a href="#search" onclick="return navigateTo('search')">Search</a></li>
      <li><a href="#get" onclick="return navigateTo('get')">Get Document</a></li>
    </ul>
  </nav>

  <fieldset id="tenant-field">
    <label>Tenant ID</label>
    <input id="tenant" type="text" value="stardewvalley" placeholder="stardewvalley" required>
  </fieldset>

  <!-- Ingest -->
  <article id="tab-ingest">
    <h3>Ingest Document</h3>
    <form id="form-ingest" onsubmit="return ingest(event)">
      <label>Title <input id="ingest-title" type="text" placeholder="Document title" required></label>
      <label>Content <textarea id="ingest-content" placeholder="Document body" rows="4" required></textarea></label>
      <label>Metadata (JSON, optional) <input id="ingest-meta" type="text" placeholder='{"source": "wiki"}'></label>
      <button type="submit">Submit</button>
    </form>
    <details id="result-ingest" hidden>
      <summary>Response</summary>
      <pre><code id="resp-ingest"></code></pre>
    </details>
  </article>

  <!-- Search -->
  <article id="tab-search" hidden>
    <h3>Search Documents</h3>
    <form id="form-search" onsubmit="return search(event)">
      <label>Query <input id="search-query" type="text" placeholder="stardrop" required></label>
      <div class="grid">
        <label>Page <input id="search-page" type="number" value="1" min="1"></label>
        <label>Size <input id="search-size" type="number" value="10" min="1" max="100"></label>
      </div>
      <button type="submit">Search</button>
    </form>
    <details id="result-search" hidden>
      <summary>Results (<span id="search-total">0</span> total)</summary>
      <div id="search-results"></div>
      <nav id="search-pagination" hidden>
        <ul>
          <li><button id="page-prev" class="secondary">← Prev</button></li>
          <li><small id="page-info"></small></li>
          <li><button id="page-next" class="secondary">Next →</button></li>
        </ul>
      </nav>
      <details>
        <summary>Raw JSON</summary>
        <pre><code id="resp-search"></code></pre>
      </details>
    </details>
  </article>

  <!-- Get Document -->
  <article id="tab-get" hidden>
    <h3>Get Document</h3>
    <form id="form-get" onsubmit="return getDoc(event)">
      <label>Document ID <input id="get-id" type="text" placeholder="uuid" required></label>
      <button type="submit">Fetch</button>
    </form>
    <div id="doc-view" hidden>
      <article id="doc-card">
        <header>
          <hgroup>
            <h2 id="doc-title"></h2>
            <p><small>ID: </small><code id="doc-uuid"></code></p>
          </hgroup>
        </header>
        <p id="doc-content"></p>
        <div id="doc-meta-section" hidden>
          <h4>Metadata</h4>
          <table class="meta-table"><tbody id="doc-meta-body"></tbody></table>
        </div>
        <footer>
          <small>Created: <span id="doc-created"></span> &middot; Updated: <span id="doc-updated"></span></small>
        </footer>
      </article>
      <details>
        <summary>Raw JSON</summary>
        <pre><code id="resp-get"></code></pre>
      </details>
    </div>
  </article>
</main>

<script>
const API = window.location.origin;

function $(id) { return document.getElementById(id); }

let ignoreHash = false;

function showTab(name) {
  document.querySelectorAll('article[id^="tab-"]').forEach(e => e.hidden = true);
  document.querySelectorAll('nav a').forEach(a => a.removeAttribute('aria-current'));
  document.querySelector(`nav a[href="#${name}"]`)?.setAttribute('aria-current', 'page');
  $(`tab-${name}`).hidden = false;
  if (name === 'get' && $('get-id').value) getDoc();
}

function navigateTo(name) {
  if (location.hash !== '#' + name) {
    ignoreHash = true;
    location.hash = name;
    ignoreHash = false;
  }
  showTab(name);
  return false;
}

function tenant() { return $('tenant').value || 'stardewvalley'; }

async function api(method, path, body) {
  const opts = { method, headers: { 'X-Tenant-ID': tenant() } };
  if (body) {
    opts.headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(body);
  }
  const resp = await fetch(`${API}${path}`, opts);
  const text = await resp.text();
  let data;
  try { data = JSON.parse(text); } catch { data = text; }
  return { ok: resp.ok, status: resp.status, data };
}

function showResult(id, resp) {
  const el = $(id);
  el.hidden = false;
  const code = el.querySelector('code');
  code.className = resp.ok ? 'success' : 'error';
  code.textContent = JSON.stringify(resp.data, null, 2);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function fmtTime(ts) {
  if (!ts) return '—';
  const d = new Date(ts);
  return d.toLocaleString();
}

async function ingest(e) {
  e.preventDefault();
  const meta = $('ingest-meta').value;
  const body = {
    title: $('ingest-title').value,
    content: $('ingest-content').value,
  };
  if (meta) {
    try { body.metadata = JSON.parse(meta); } catch { body.metadata = meta; }
  }
  const resp = await api('POST', '/documents', body);
  showResult('result-ingest', resp);
}

async function search(e) {
  e.preventDefault();
  const q = encodeURIComponent($('search-query').value);
  const p = $('search-page').value;
  const s = $('search-size').value;
  const resp = await api('GET', `/search?q=${q}&page=${p}&size=${s}`);
  $('search-total').textContent = resp.data?.total ?? '?';
  showResult('result-search', resp);
  const details = $('result-search');
  details.hidden = false;
  details.open = true;
  const d = resp.data;
  const container = $('search-results');
  container.innerHTML = '';
  const pagination = $('search-pagination');
  if (d?.results?.length) {
    const table = document.createElement('table');
    table.innerHTML = `<thead><tr><th>Rank</th><th>Title</th><th>ID</th></tr></thead>`;
    const tbody = document.createElement('tbody');
    for (const r of d.results) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${r.rank.toFixed(2)}</td><td>${esc(r.title)}</td><td><code>${r.id}</code></td>`;
      tr.style.cursor = 'pointer';
      tr.onclick = () => { $('get-id').value = r.id; navigateTo('get'); };
      tbody.appendChild(tr);
    }
    table.appendChild(tbody);
    container.appendChild(table);
    const totalPages = Math.ceil(d.total / d.size);
    const page = d.page;
    $('page-info').textContent = `Page ${page} of ${totalPages} (${d.total} results)`;
    const prevBtn = $('page-prev');
    const nextBtn = $('page-next');
    prevBtn.disabled = page <= 1;
    nextBtn.disabled = page >= totalPages;
    prevBtn.onclick = () => { $('search-page').value = page - 1; search(); };
    nextBtn.onclick = () => { $('search-page').value = page + 1; search(); };
    pagination.hidden = false;
  } else {
    pagination.hidden = true;
  }
}

async function getDoc(e) {
  if (e) e.preventDefault();
  const id = $('get-id').value;
  const resp = await api('GET', `/documents/${id}`);
  const view = $('doc-view');
  const raw = $('resp-get');
  raw.className = resp.ok ? 'success' : 'error';
  raw.textContent = JSON.stringify(resp.data, null, 2);
  if (!resp.ok || resp.data?.error) {
    $('doc-card').hidden = true;
    view.hidden = false;
    return;
  }
  $('doc-card').hidden = false;
  const d = resp.data;
  $('doc-title').textContent = d.title;
  $('doc-uuid').textContent = d.id;
  $('doc-content').textContent = d.content;
  $('doc-created').textContent = fmtTime(d.created_at);
  $('doc-updated').textContent = fmtTime(d.updated_at);
  const metaBody = $('doc-meta-body');
  metaBody.innerHTML = '';
  if (d.metadata && Object.keys(d.metadata).length > 0) {
    $('doc-meta-section').hidden = false;
    for (const [k, v] of Object.entries(d.metadata)) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td>${esc(k)}</td><td>${esc(typeof v === 'object' ? JSON.stringify(v) : String(v))}</td>`;
      metaBody.appendChild(tr);
    }
  } else {
    $('doc-meta-section').hidden = true;
  }
  view.hidden = false;
}

window.addEventListener('hashchange', () => {
  if (ignoreHash) return;
  showTab(location.hash.replace('#', '') || 'ingest');
});

navigateTo(location.hash.replace('#', '') || 'ingest');
</script>
</body>
</html>
